[build]
  command   = "cp prisma/schema.prod.prisma prisma/schema.prisma && prisma generate && prisma db push --skip-generate && next build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

# Required environment variables — set these in Netlify dashboard:
# DATABASE_URL        = "postgresql://postgres:[PASSWORD]@db.[PROJECT].supabase.co:5432/postgres"
# JWT_SECRET          = "<long random string>"
# NEXT_PUBLIC_USE_MOCK_API = "false"
# NEXT_PUBLIC_API_BASE_URL = "/api"
# R2_ACCOUNT_ID       = "..."   (Cloudflare R2)
# R2_ACCESS_KEY_ID    = "..."
# R2_SECRET_ACCESS_KEY= "..."
# R2_BUCKET_NAME      = "snapschool-photos"
# R2_PUBLIC_URL       = "https://..."
# RAZORPAY_KEY_ID     = "rzp_live_..."
# RAZORPAY_KEY_SECRET = "..."
# RESEND_API_KEY      = "re_..."
# NEXT_PUBLIC_SUPABASE_URL  = "https://[PROJECT].supabase.co"
# NEXT_PUBLIC_SUPABASE_ANON_KEY = "..."

[[plugins]]
  package = "@netlify/plugin-nextjs"
